AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cognito User Pool for MDR self-serve registration.
  Creates a User Pool with self-registration enabled, an SPA-compatible OAuth client,
  and a post-confirmation Lambda that assigns each new user to their own Cognito group.

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (dev, demo)
  ServiceName:
    Type: String
    Default: mdr
    Description: Service name prefix for resource naming
  FrontendDomainName:
    Type: String
    Description: Frontend domain for OAuth callback URLs (e.g., mdr.dev.lif.unicon.net)
  LocalDevCallbackUrl:
    Type: String
    Default: http://localhost:5173
    Description: Local dev server URL for OAuth callbacks during development

Resources:

  # ---------------------------------------------------------------------------
  # Cognito User Pool — self-registration enabled
  # ---------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${EnvironmentName}-${ServiceName}-selfserve
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      # Customize the verification email so recipients see a branded subject
      # they recognize as "the thing they just signed up for" rather than
      # Cognito's generic boilerplate, which Gmail/Outlook spam heuristics
      # frequently flag. Sender is still Cognito's default
      # (no-reply@verificationemail.com); migrating to SES requires AWS
      # production-access approval and is deferred.
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailSubject: !Sub "LIF Metadata Repository (${EnvironmentName}) — confirm your email"
        EmailMessage: |
          Welcome to the LIF Metadata Repository self-serve evaluator program.

          Your 6-digit confirmation code is {####}.

          Enter this code on the registration page to complete sign-up. If
          you didn't request this account, no action is needed and the
          account will not be created.
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: organization
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MaxLength: "256"
        - Name: role
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MaxLength: "256"
        - Name: reason
          AttributeDataType: String
          Required: false
          Mutable: true
          StringAttributeConstraints:
            MaxLength: "1024"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpLambda.Arn
        PostConfirmation: !GetAtt PostConfirmationLambda.Arn

  # ---------------------------------------------------------------------------
  # Cognito Domain — Hosted UI
  # ---------------------------------------------------------------------------
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${EnvironmentName}-${ServiceName}-selfserve
      UserPoolId: !Ref UserPool

  # ---------------------------------------------------------------------------
  # Cognito Client — SPA (public client, PKCE, no secret)
  # ---------------------------------------------------------------------------
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${EnvironmentName}-${ServiceName}-spa
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - !Sub https://${FrontendDomainName}/auth/callback
        - !Sub ${LocalDevCallbackUrl}/auth/callback
      LogoutURLs:
        - !Sub https://${FrontendDomainName}/login
        - !Sub ${LocalDevCallbackUrl}/login
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      IdTokenValidity: 60
      AccessTokenValidity: 60
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

  # ---------------------------------------------------------------------------
  # LIF team group — routes to tenant_lif_team when tenant routing is enabled
  # (issue #883 PR 3). Group membership is NOT managed by CloudFormation:
  # the LIF team adds themselves via the Cognito console or Admin API as a
  # one-time post-deploy step. Evaluators auto-join their own eval-{username}
  # group via the post-confirmation Lambda and never land here.
  # ---------------------------------------------------------------------------
  LifTeamGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      UserPoolId: !Ref UserPool
      GroupName: lif-team
      Description: Internal LIF team — MDR API routes their requests to tenant_lif_team.
      Precedence: 10

  # ---------------------------------------------------------------------------
  # Post-Confirmation Lambda — creates a Cognito group for each new user
  # ---------------------------------------------------------------------------
  PostConfirmationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-${ServiceName}-post-confirm
      Description: >
        Cognito post-confirmation trigger: creates an eval-{username} group,
        adds the confirmed user to it, and calls the MDR API to provision a
        tenant_{group} PostgreSQL schema (issue #883 PR 4b).
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      ReservedConcurrentExecutions: 5
      Role: !GetAtt PostConfirmationLambdaRole.Arn
      Environment:
        Variables:
          MDR_API_URL: !Sub https://${ServiceName}-api.${EnvironmentName}.lif.unicon.net
          MDR_API_KEY_SSM_PARAM: !Sub /${EnvironmentName}/${ServiceName}-post-confirm/MdrApiKey
      Code:
        ZipFile: |
          import json
          import logging
          import os
          import re
          import urllib.error
          import urllib.request

          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          cognito = boto3.client("cognito-idp")
          ssm = boto3.client("ssm")

          MDR_API_URL = os.environ["MDR_API_URL"]
          MDR_API_KEY_SSM_PARAM = os.environ["MDR_API_KEY_SSM_PARAM"]

          # Cache across warm invocations so we read SSM once per container.
          _mdr_api_key = None


          def _get_mdr_api_key():
              global _mdr_api_key
              if _mdr_api_key is None:
                  resp = ssm.get_parameter(Name=MDR_API_KEY_SSM_PARAM, WithDecryption=True)
                  _mdr_api_key = resp["Parameter"]["Value"]
              return _mdr_api_key


          def _provision_tenant(group_name):
              """Call MDR API to create a tenant_{group} schema.

              Failures are logged but not raised — Cognito has already confirmed
              the user and re-raising would put them in an unrecoverable "confirmed
              but unprovisioned" state from the Hosted UI perspective. Ops can
              re-run provisioning manually by invoking the endpoint with the same
              group_name (it's idempotent).
              """
              req = urllib.request.Request(
                  f"{MDR_API_URL}/tenants/provision",
                  data=json.dumps({"group_name": group_name}).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json",
                      "X-API-Key": _get_mdr_api_key(),
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      body = resp.read().decode("utf-8")
                      logger.info(
                          "Tenant provisioned: status=%s group=%s body=%s",
                          resp.status, group_name, body,
                      )
              except urllib.error.HTTPError as e:
                  logger.error(
                      "MDR /tenants/provision returned %s for group %s: %s",
                      e.code, group_name, e.read().decode("utf-8", errors="replace"),
                  )
              except (urllib.error.URLError, TimeoutError) as e:
                  logger.error(
                      "MDR /tenants/provision network error for group %s: %s",
                      group_name, e,
                  )


          def handler(event, context):
              """Cognito PostConfirmation trigger.

              Creates an eval-{username} group, adds the user to it, and
              provisions a tenant schema. Cognito group and tenant provisioning
              failures do not block confirmation.
              """
              user_pool_id = event["userPoolId"]
              username = event["userName"]

              # Sanitize for group name: lowercase, replace non-alphanumeric with hyphens
              safe_name = re.sub(r"[^a-z0-9]", "-", username.lower()).strip("-")[:60]
              group_name = f"eval-{safe_name}"

              try:
                  cognito.create_group(
                      GroupName=group_name,
                      UserPoolId=user_pool_id,
                      Description=f"Auto-created group for {username}",
                  )
              except cognito.exceptions.GroupExistsException:
                  pass  # Idempotent — group already exists

              cognito.admin_add_user_to_group(
                  UserPoolId=user_pool_id,
                  Username=username,
                  GroupName=group_name,
              )

              _provision_tenant(group_name)

              return event

  PostConfirmationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-${ServiceName}-post-confirm-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoGroupManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:CreateGroup
                  - cognito-idp:AdminAddUserToGroup
                Resource: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*
        - PolicyName: ReadMdrApiKey
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/${ServiceName}-post-confirm/MdrApiKey
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm

  PostConfirmationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostConfirmationLambda
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ---------------------------------------------------------------------------
  # Pre-Signup Lambda — registration abuse controls (issue #917)
  #
  # PR 1 of #917: reject sign-ups from disposable / throwaway email domains.
  # This is the enforcement-point + config pattern that later PRs extend with
  # daily/total caps (PG schema count) and an invite-code bypass.
  #
  # A Cognito PreSignUp trigger blocks a registration by RAISING — Cognito
  # surfaces the exception message to the Hosted UI. Returning the event lets
  # the sign-up proceed. (autoConfirmUser does NOT gate registration; it only
  # controls auto-confirmation, so it is not used to reject here.)
  #
  # The blocklist is a baseline list baked into the function, optionally
  # extended by an SSM StringList/String parameter so ops can add domains
  # without a redeploy (issue #917 design decision 4: config adjustable via
  # SSM). The parameter is intentionally NOT managed by this template so that
  # manual edits aren't clobbered on the next deploy; the Lambda falls back to
  # the baseline list when the parameter is absent.
  # ---------------------------------------------------------------------------
  PreSignUpLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${EnvironmentName}-${ServiceName}-pre-signup
      Description: >
        Cognito pre-signup trigger: rejects registrations from disposable
        email domains (issue #917 PR 1). Baseline blocklist extendable via the
        /${EnvironmentName}/${ServiceName}-pre-signup/DisposableDomains SSM
        parameter (optional; falls back to baseline when absent).
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      ReservedConcurrentExecutions: 5
      Role: !GetAtt PreSignUpLambdaRole.Arn
      Environment:
        Variables:
          DISPOSABLE_DOMAINS_SSM_PARAM: !Sub /${EnvironmentName}/${ServiceName}-pre-signup/DisposableDomains
      Code:
        ZipFile: |
          import logging
          import os
          import re
          import time

          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          ssm = boto3.client("ssm")

          DISPOSABLE_DOMAINS_SSM_PARAM = os.environ.get("DISPOSABLE_DOMAINS_SSM_PARAM", "")

          # Baseline blocklist — common disposable / throwaway providers. Kept
          # deliberately short and obvious; the SSM parameter is the place to
          # grow it without a redeploy. Domains are compared lowercased.
          _BASELINE_DISPOSABLE_DOMAINS = frozenset({
              "mailinator.com",
              "guerrillamail.com",
              "guerrillamailblock.com",
              "sharklasers.com",
              "10minutemail.com",
              "temp-mail.org",
              "tempmail.com",
              "throwawaymail.com",
              "yopmail.com",
              "trashmail.com",
              "getnada.com",
              "dispostable.com",
              "maildrop.cc",
              "fakeinbox.com",
              "mailnesia.com",
              "mohmal.com",
              "spam4.me",
              "tempinbox.com",
              "emailondeck.com",
              "moakt.com",
          })

          # Cache the merged set across warm invocations, refreshed every
          # _CACHE_TTL seconds so an operator's SSM edit is picked up without a
          # redeploy or waiting for containers to recycle.
          _CACHE_TTL = 300
          _disposable_domains = None
          _cache_loaded_at = 0.0


          def _load_disposable_domains():
              """Baseline blocklist merged with the optional SSM parameter.

              Cached for _CACHE_TTL seconds. Fails open: a missing parameter or
              an SSM read error never blocks a legitimate sign-up — the baseline
              list still applies.
              """
              global _disposable_domains, _cache_loaded_at
              now = time.monotonic()
              if _disposable_domains is not None and now - _cache_loaded_at < _CACHE_TTL:
                  return _disposable_domains

              domains = set(_BASELINE_DISPOSABLE_DOMAINS)
              if DISPOSABLE_DOMAINS_SSM_PARAM:
                  try:
                      resp = ssm.get_parameter(Name=DISPOSABLE_DOMAINS_SSM_PARAM)
                      raw = resp["Parameter"]["Value"]
                      domains.update(
                          d.strip().lower() for d in re.split(r"[,\s]+", raw) if d.strip()
                      )
                  except ssm.exceptions.ParameterNotFound:
                      logger.info(
                          "Disposable-domains param %s not set; using baseline list",
                          DISPOSABLE_DOMAINS_SSM_PARAM,
                      )
                  except Exception as e:  # noqa: BLE001 — fail open on config read
                      logger.warning(
                          "Could not read disposable-domains param %s: %s; using baseline",
                          DISPOSABLE_DOMAINS_SSM_PARAM, e,
                      )

              _disposable_domains = frozenset(domains)
              _cache_loaded_at = now
              return _disposable_domains


          def _is_disposable(domain, blocked):
              """True if the domain or any of its parent domains is blocked.

              A bare blocklist entry (mailinator.com) also matches its
              subdomains (x.mailinator.com) so the obvious wildcard-subdomain
              bypass is closed. The public suffix alone (e.g. "com") is never
              matched because the loop stops before the final label.
              """
              if domain in blocked:
                  return True
              parts = domain.split(".")
              for i in range(1, len(parts) - 1):
                  if ".".join(parts[i:]) in blocked:
                      return True
              return False


          def handler(event, context):
              """Cognito PreSignUp trigger.

              Raises (blocking the sign-up) when the email's domain is on the
              disposable blocklist; Cognito relays the message to the Hosted UI.
              Returns the event unchanged to allow the sign-up.
              """
              attributes = event.get("request", {}).get("userAttributes", {})
              email = (attributes.get("email") or "").strip().lower()
              # rstrip(".") normalizes the RFC-1034 trailing-dot FQDN form.
              domain = email.rpartition("@")[2].rstrip(".")

              if domain and _is_disposable(domain, _load_disposable_domains()):
                  logger.info("Rejecting sign-up from disposable email domain: %s", domain)
                  raise Exception(
                      "Registrations from disposable or temporary email domains are "
                      "not accepted. Please register with a permanent email address."
                  )

              return event

  PreSignUpLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-${ServiceName}-pre-signup-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReadDisposableDomains
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Plain String parameter (not a secret) — no kms:Decrypt needed.
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvironmentName}/${ServiceName}-pre-signup/DisposableDomains

  PreSignUpLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PreSignUpLambda
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  # ---------------------------------------------------------------------------
  # SSM Parameters — consumed by MDR API task definition
  # ---------------------------------------------------------------------------
  UserPoolIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${EnvironmentName}/${ServiceName}/CognitoUserPoolId
      Type: String
      Value: !Ref UserPool
      Description: Cognito User Pool ID for MDR self-serve registration

  SpaClientIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${EnvironmentName}/${ServiceName}/CognitoSpaClientId
      Type: String
      Value: !Ref UserPoolClient
      Description: Cognito SPA Client ID for MDR frontend

  CognitoDomainParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${EnvironmentName}/${ServiceName}/CognitoDomain
      Type: String
      Value: !Sub ${EnvironmentName}-${ServiceName}-selfserve.auth.${AWS::Region}.amazoncognito.com
      Description: Cognito Hosted UI domain for MDR self-serve

Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Description: Cognito User Pool ID
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Description: Cognito User Pool ARN
  SpaClientId:
    Value: !Ref UserPoolClient
    Description: SPA Client ID
  CognitoDomain:
    Value: !Sub ${EnvironmentName}-${ServiceName}-selfserve.auth.${AWS::Region}.amazoncognito.com
    Description: Cognito Hosted UI domain
  HostedUiUrl:
    Value: !Sub >-
      https://${EnvironmentName}-${ServiceName}-selfserve.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=https://${FrontendDomainName}/auth/callback
    Description: Hosted UI login URL (for reference)
